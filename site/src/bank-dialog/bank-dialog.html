<div class="bank-dialog dialog dialog__visible">
  <div class="bank-dialog__container dialog__container metal-border rsbackground">
    <div class="bank-dialog__header">
      <div class="bank-dialog__header-spacer"></div>
      <div class="bank-dialog__title-group">
        <h2 class="bank-dialog__title">${this.playerName}'s Bank</h2>
      </div>
      <button class="bank-dialog__close dialog__close">
        <img src="/ui/1731-0.png" alt="Close dialog" title="Close dialog" />
      </button>
    </div>

    <div class="bank-dialog__title-border"></div>

    <div class="bank-dialog__search-bar">
      <input type="text" class="bank-dialog__search-input" placeholder="Search..." />
      <span class="bank-dialog__item-count"></span>
    </div>

    <div class="bank-dialog__content">
      <div class="bank-dialog__status"></div>
      <div class="bank-dialog__items"></div>
    </div>

    <div class="bank-dialog__footer">
      <span class="bank-dialog__value"></span>
    </div>
  </div>
</div>
