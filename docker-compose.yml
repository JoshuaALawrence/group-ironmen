version: "3.8"
services:
  group-ironmen-tracker-frontend:
    image: ${FRONTEND_IMAGE:-chrisleeeee/group-ironmen-tracker-frontend}:${IMAGE_TAG:-latest}
    environment:
      - HOST_URL=${HOST_URL}
    restart: always
    container_name: group-ironmen-tracker-frontend
    ports:
      - 4000:4000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  group-ironmen-tracker-backend:
    image: ${BACKEND_IMAGE:-chrisleeeee/group-ironmen-tracker-backend}:${IMAGE_TAG:-latest}
    environment:
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT}
      - PG_DB=${PG_DB}
      - BACKEND_SECRET=${BACKEND_SECRET}
      - HCAPTCHA_SECRET=${HCAPTCHA_SECRET:-}
    restart: always
    container_name: group-ironmen-tracker-backend
    ports:
      - 5000:8081
    depends_on:
      group-ironmen-tracker-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/captcha-enabled"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  group-ironmen-tracker-db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DB}
      - PGDATA=/var/lib/postgresql/data
    restart: always
    container_name: group-ironmen-tracker-db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
