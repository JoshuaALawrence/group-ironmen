version: "3.8"
services:
  app:
    image: joshuaalawrence/osrs-group-ironman-tracker:latest
    environment:
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_HOST=db
      - PG_PORT=5432
      - PG_DB=${PG_DB}
      - BACKEND_SECRET=${BACKEND_SECRET}
      - HCAPTCHA_SECRET=${HCAPTCHA_SECRET:-}
      - HCAPTCHA_SITEKEY=${HCAPTCHA_SITEKEY:-}
    restart: always
    container_name: group-ironmen-app
    dns:
      - 8.8.8.8
    ports:
      - 4000:4000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/api/captcha-enabled"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=${PG_USER}
      - POSTGRES_PASSWORD=${PG_PASSWORD}
      - POSTGRES_DB=${PG_DB}
      - PGDATA=/var/lib/postgresql/data
    restart: always
    container_name: group-ironmen-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
