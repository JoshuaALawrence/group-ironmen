<div class="dialog__container request-dialog__container rsborder rsbackground">
  <h2>Request ${this.itemName}</h2>
  <p>How many do you want to request?</p>
  <div class="request-dialog__input-row">
    <input class="request-dialog__quantity" type="text" inputmode="decimal" value="1" placeholder="e.g. 10k, 5m, 1b" />
  </div>
  <div class="request-dialog__buttons">
    <button class="request-dialog__confirm men-button">Confirm</button>
    <button class="request-dialog__cancel men-button">Cancel</button>
  </div>
</div>
